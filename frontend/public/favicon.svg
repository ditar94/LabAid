<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="flask" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338CA"/>
      <stop offset="100%" style="stop-color:#6D5BF7"/>
    </linearGradient>
    <linearGradient id="liq" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#A5B4FC;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#818CF8;stop-opacity:0.8"/>
    </linearGradient>
  </defs>
  <g transform="translate(16, 17)">
    <!-- Flask body -->
    <path d="M -4.5,-14 L -4.5,-5.5 L -13,9.5 Q -14.8,13 -12.5,15.5 Q -10.5,17.5 -7,17.5 L 7,17.5 Q 10.5,17.5 12.5,15.5 Q 14.8,13 13,9.5 L 4.5,-5.5 L 4.5,-14 Z" fill="url(#flask)"/>
    <!-- Flask rim -->
    <rect x="-6.5" y="-15.8" width="13" height="2.5" rx="1.25" fill="url(#flask)"/>
    <!-- Liquid area -->
    <path d="M -11,8 Q -7,5.5 -3,8 Q 1,10.5 5,7.5 Q 9,5.5 12,8 L 13,9.5 Q 14.8,13 12.5,15.5 Q 10.5,17.5 7,17.5 L -7,17.5 Q -10.5,17.5 -12.5,15.5 Q -14.8,13 -13,9.5 Z" fill="url(#liq)"/>
    <!-- Barcode bars clipped inside flask bottom -->
    <g opacity="0.85">
      <rect x="-7" y="9" width="1.3" height="6" rx="0.3" fill="#FFFFFF"/>
      <rect x="-4.8" y="9" width="0.8" height="6" rx="0.3" fill="#FFFFFF"/>
      <rect x="-3" y="9" width="1.6" height="6" rx="0.3" fill="#FFFFFF"/>
      <rect x="-0.4" y="9" width="0.8" height="6" rx="0.3" fill="#FFFFFF"/>
      <rect x="1.4" y="9" width="1.3" height="6" rx="0.3" fill="#FFFFFF"/>
      <rect x="3.7" y="9" width="0.8" height="6" rx="0.3" fill="#FFFFFF"/>
      <rect x="5.5" y="9" width="1.6" height="6" rx="0.3" fill="#FFFFFF"/>
    </g>
    <!-- Plus/cross -->
    <rect x="-1.1" y="-11.5" width="2.2" height="6" rx="0.7" fill="#FFFFFF" opacity="0.95"/>
    <rect x="-3.2" y="-9.8" width="6.4" height="2.2" rx="0.7" fill="#FFFFFF" opacity="0.95"/>
  </g>
