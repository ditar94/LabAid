    <path d="M -72,-224 L -72,-88 L -208,152 Q -237,208 -200,248 Q -168,280 -112,280 L 112,280 Q 168,280 200,248 Q 237,208 208,152 L 72,-88 L 72,-224 Z" fill="url(#flask)"/>
    <!-- Flask rim -->
