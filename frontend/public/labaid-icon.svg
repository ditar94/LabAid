    <!-- Barcode bars in liquid -->
    <g opacity="0.85">
      <rect x="-112" y="144" width="21" height="96" rx="5" fill="#FFFFFF"/>
      <rect x="-77" y="144" width="13" height="96" rx="4" fill="#FFFFFF"/>
      <rect x="-51" y="144" width="26" height="96" rx="5" fill="#FFFFFF"/>
      <rect x="-6" y="144" width="13" height="96" rx="4" fill="#FFFFFF"/>
      <rect x="22" y="144" width="21" height="96" rx="5" fill="#FFFFFF"/>
      <rect x="59" y="144" width="13" height="96" rx="4" fill="#FFFFFF"/>
      <rect x="88" y="144" width="26" height="96" rx="5" fill="#FFFFFF"/>
    </g>
    <!-- Plus/cross -->
    <rect x="-18" y="-184" width="36" height="96" rx="11" fill="#FFFFFF" opacity="0.95"/>
    <rect x="-51" y="-157" width="102" height="36" rx="11" fill="#FFFFFF" opacity="0.95"/>
